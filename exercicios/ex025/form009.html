<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario</title>
</head>
<body>
    <form action="cadstro.php" method="get" autocomplete="on">
        <h1>Exemplo de formulario</h1>
        <p>
            <label for="inu">Número: </label>
            <input type="range" name="nun" id="inun" min="o" max="10" value="5" oninput= "ival.innerHTML = Number(inun.value)">
            <output id="ival">5</output>
        </p>
        <p>
            <input type="submit" value="Enviar">
            <Input type="reset" value="Limpar">
        </p>
    </form>

</body>
</html>
