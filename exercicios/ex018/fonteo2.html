<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family:'Love' ;
            src: url('fontes/love larry .otf') format('opentype'), url('fontes/love larry ttf.ttf') format('truetype');

        body {

        }

</head>
